<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Page</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

.container {
  width: 90%;
  max-width: 600px;
  margin: 20px auto;
}

h2 {
  text-align: center;
}

/* FACEBOOK STYLE POST BOX */
.post-box {
  background: #fff;
  padding: 15px;
  border-radius: 16px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  margin-bottom: 20px;
}

.top-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
}

.user-info {
  flex: 1;
}

.username {
  font-weight: bold;
  font-size: 14px;
}

.visibility {
  font-size: 12px;
  color: gray;
}

textarea {
  width: 100%;
  border: none;
  outline: none;
  font-size: 16px;
  margin-top: 10px;
  resize: none;
}

/* PRODUCT PREVIEW */
.product-preview {
  background: #f9f9f9;
  padding: 10px;
  border-radius: 12px;
  margin-top: 10px;
}

.product-preview img {
  width: 100%;
  border-radius: 10px;
}

/* BUTTON */
.post-btn {
  padding: 8px 20px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  display: block;
  margin: 10px auto 0;
}

/* POSTS */
.post {
  background: #fff;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.post img {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

.actions {
  display: flex;
  gap: 15px;
  margin-top: 10px;
}

.actions span {
  cursor: pointer;
  font-size: 14px;
}

.comment-box {
  display: none;
  margin-top: 10px;
}

.comment-box input {
  width: 70%;
}
</style>
</head>

<body>

<div class="container">

<h2>Community Posts</h2>

<!-- 🔥 FACEBOOK STYLE POST BOX -->
<div class="post-box">

  <div class="top-row">
    <img src="https://i.pravatar.cc/40" class="avatar">
    <div class="user-info">
      <div class="username">@you</div>
      <div class="visibility">🌍 Public</div>
    </div>
  </div>

  <textarea id="captionInput" placeholder="What's on your mind?"></textarea>

  <div id="productPreview" class="product-preview" style="display:none;">
    <img id="previewImg">
    <p id="productName"></p>
  </div>

  <button class="post-btn" onclick="createPost()">Post</button>
</div>

<div id="postsContainer"></div>

</div>

<script>

/* ✅ 4 DEFAULT POSTS */
const defaultPosts = [
  {username:"khushi", caption:"Loving this new outfit 😍", image:"https://via.placeholder.com/500", likes:2, comments:[]},
  {username:"fashiongirl", caption:"Summer vibes ☀️", image:"https://via.placeholder.com/500", likes:5, comments:[]},
  {username:"stylequeen", caption:"This bag is amazing 💼✨", image:"https://via.placeholder.com/500", likes:3, comments:[]},
  {username:"trendsetter", caption:"Minimal & classy 🔥", image:"https://via.placeholder.com/500", likes:4, comments:[]}
];

/* LOAD POSTS (USER POSTS FIRST) */
function loadPosts() {
  const container = document.getElementById("postsContainer");
  container.innerHTML = "";

  let userPosts = JSON.parse(localStorage.getItem("posts")) || [];

  let allPosts = [...userPosts, ...defaultPosts];

  allPosts.forEach((postData, index) => {

    const post = document.createElement("div");
    post.className = "post";

    let commentsHTML = postData.comments.map(c => `<div>${c}</div>`).join("");

    post.innerHTML = `
      <b>${postData.username}</b>
      <div>${postData.caption}</div>
      ${postData.image ? `<img src="${postData.image}">` : ""}

      <div class="actions">
        <span onclick="likePost(${index})">❤️ ${postData.likes}</span>
        <span onclick="toggleComments(this)">💬 Comment</span>
        ${index < userPosts.length ? `<span onclick="deletePost(${index})">🗑️ Delete</span>` : ""}
      </div>

      <div>${commentsHTML}</div>

      <div class="comment-box">
        <input type="text" placeholder="Add comment">
        <button onclick="addComment(${index}, this)">Post</button>
      </div>
    `;

    container.appendChild(post);
  });
}

/* CREATE POST */
function createPost() {
  const caption = document.getElementById("captionInput").value.trim();
  const product = JSON.parse(localStorage.getItem("selectedProduct"));

  if (!caption && !product) {
    alert("Please write something!");
    return;
  }

  if (product) {
    savePost(caption || `Reviewing: ${product.name} ✨`, product.image);
    localStorage.removeItem("selectedProduct");
  } else {
    savePost(caption, null);
  }

  document.getElementById("captionInput").value = "";
  document.getElementById("productPreview").style.display = "none";

  alert("✅ Your review has been posted!");
}

/* SAVE POST */
function savePost(caption, image) {
  let posts = JSON.parse(localStorage.getItem("posts")) || [];

  posts.unshift({
    username: "@you",
    caption: caption,
    image: image,
    likes: 0,
    comments: []
  });

  localStorage.setItem("posts", JSON.stringify(posts));
  loadPosts();
}

/* LIKE */
function likePost(index) {
  let userPosts = JSON.parse(localStorage.getItem("posts")) || [];

  if (index < userPosts.length) {
    userPosts[index].likes++;
    localStorage.setItem("posts", JSON.stringify(userPosts));
  } else {
    defaultPosts[index - userPosts.length].likes++;
  }

  loadPosts();
}

/* DELETE */
function deletePost(index) {
  let userPosts = JSON.parse(localStorage.getItem("posts")) || [];
  userPosts.splice(index, 1);
  localStorage.setItem("posts", JSON.stringify(userPosts));
  loadPosts();
}

/* COMMENTS */
function toggleComments(el) {
  const box = el.closest('.post').querySelector('.comment-box');
  box.style.display = box.style.display === "none" ? "block" : "none";
}

function addComment(index, btn) {
  const input = btn.previousElementSibling;
  const text = input.value.trim();
  if (!text) return;

  let userPosts = JSON.parse(localStorage.getItem("posts")) || [];

  if (index < userPosts.length) {
    userPosts[index].comments.push("@you: " + text);
    localStorage.setItem("posts", JSON.stringify(userPosts));
  } else {
    defaultPosts[index - userPosts.length].comments.push("@you: " + text);
  }

  loadPosts();
}

/* PAGE LOAD */
window.onload = function () {
  loadPosts();

  alert(
    "Welcome to the Community Page!\n\n" +
    "Share your reviews about purchased products.\n\n" +
    "⚠️ PLEASE SCROLL TO THE END."
  );

  const product = JSON.parse(localStorage.getItem("selectedProduct"));

  if (product) {
    document.getElementById("captionInput").value =
      `Reviewing: ${product.name} ✨`;

    document.getElementById("productPreview").style.display = "block";
    document.getElementById("previewImg").src = product.image;
    document.getElementById("productName").innerText = product.name;
  }
};

/* SCROLL END */
window.onscroll = function () {
  if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 5) {
    if (!window.reachedEnd) {
      window.reachedEnd = true;

      alert("You reached the end. Click OK to continue.");

      window.location.href = "https://forms.gle/YOUR_FORM_LINK";
    }
  }
};

</script>

</body>
</html>
