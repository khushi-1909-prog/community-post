<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Page</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; }
    .container { width: 90%; max-width: 600px; margin: 20px auto; }
    h1 { text-align: center; margin-bottom: 20px; }

    .post-box, .post {
      background: #fff; padding: 15px; border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08); margin-bottom: 20px;
    }

    textarea {
      width: 100%; height: 80px; border: 1px solid #ddd;
      border-radius: 8px; padding: 10px; resize: none; margin-bottom: 10px;
    }

    input[type="file"] { margin-bottom: 10px; }

    button {
      width: 100%; padding: 10px; background: #007bff; color: white;
      border: none; border-radius: 8px; cursor: pointer; font-size: 16px;
    }
    button:hover { background: #0056b3; }

    .post img { width: 100%; border-radius: 10px; margin-top: 10px; }
    .username { font-weight: bold; margin-bottom: 5px; }
    .caption { margin-bottom: 10px; }

    /* Success Modal */
    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: none; justify-content: center; align-items: center;
    }

    .modal-content {
      background: white; padding: 20px; border-radius: 12px;
      text-align: center; width: 80%; max-width: 300px;
    }

    .modal-content h2 { margin-bottom: 15px; }

    .continue-btn {
      background: #28a745;
    }

    .continue-btn:hover {
      background: #1e7e34;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Community Posts</h1>

    <div class="post-box">
      <textarea id="captionInput" placeholder="Write something..."></textarea>
      <input type="file" id="imageInput" accept="image/*">
      <button onclick="createPost()">Post</button>
    </div>

    <div id="postsContainer">
      <div class="post">
        <div class="username">khushi</div>
        <div class="caption">Loving this new outfit! 😍</div>
        <img src="https://via.placeholder.com/500">
      </div>

      <div class="post">
        <div class="username">fashiongirl</div>
        <div class="caption">Tried a new styling look today ✨</div>
        <img src="https://via.placeholder.com/500">
      </div>
    </div>
  </div>

  <!-- Success Popup -->
  <div class="modal" id="successModal">
    <div class="modal-content">
      <h2>✅ Post Uploaded!</h2>
      <p>Your post is successfully uploaded.</p>
      <button class="continue-btn" onclick="goToNextPage()">Continue</button>
    </div>
  </div>

  <script>
    function createPost() {
      const caption = document.getElementById("captionInput").value.trim();
      const imageInput = document.getElementById("imageInput");
      const file = imageInput.files[0];

      if (!caption && !file) {
        alert("Please add a caption or image!");
        return;
      }

      const postDiv = document.createElement("div");
      postDiv.className = "post";

      let imageHTML = "";

      if (file) {
        const imageURL = URL.createObjectURL(file);
        imageHTML = `<img src="${imageURL}">`;
      }

      postDiv.innerHTML = `
        <div class="username">@you</div>
        <div class="caption">${caption}</div>
        ${imageHTML}
      `;

      const container = document.getElementById("postsContainer");
      container.prepend(postDiv);

      document.getElementById("captionInput").value = "";
      imageInput.value = "";

      // Show success popup
      document.getElementById("successModal").style.display = "flex";
    }

    function goToNextPage() {
      window.location.href = "nextpage.html"; // change this to your actual page
    }
  </script>

</body>
</html>
