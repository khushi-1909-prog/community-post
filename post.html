<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Page</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; }
    .container { width: 90%; max-width: 600px; margin: 20px auto; }
    h1 { text-align: center; margin-bottom: 20px; }

    .post-box, .post {
      background: #fff; padding: 15px; border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08); margin-bottom: 20px;
    }

    textarea {
      width: 100%; height: 80px; border: 1px solid #ddd;
      border-radius: 8px; padding: 10px; resize: none; margin-bottom: 10px;
    }

    input[type="file"] { margin-bottom: 10px; }

    button {
      width: 100%; padding: 10px; background: #007bff; color: white;
      border: none; border-radius: 8px; cursor: pointer; font-size: 16px;
    }
    button:hover { background: #0056b3; }

    .post img { width: 100%; border-radius: 10px; margin-top: 10px; }
    .username { font-weight: bold; margin-bottom: 5px; }
    .caption { margin-bottom: 10px; }

    /* Success Modal */
    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: none; justify-content: center; align-items: center;
    }

    .modal-content {
      background: white; padding: 20px; border-radius: 12px;
      text-align: center; width: 80%; max-width: 300px;
    }

    .modal-content h2 { margin-bottom: 15px; }

    .continue-btn {
      background: #28a745;
    }

    .continue-btn:hover {
      background: #1e7e34;
    }
    .actions {
  display: flex;
  gap: 15px;
  margin-top: 10px;
}

.actions span {
  cursor: pointer;
  font-size: 14px;
}

.comments {
  margin-top: 10px;
}

.comment {
  font-size: 14px;
  margin-top: 5px;
}

.comment-box {
  display: flex;
  gap: 5px;
  margin-top: 10px;
}

.comment-box input {
  flex: 1;
  padding: 5px;
}
  </style>
</head>
<body>

  <div class="container">
    <h1>Community Posts</h1>

    <div class="post-box">
      <textarea id="captionInput" placeholder="Write something..."></textarea>
      <input type="file" id="imageInput" accept="image/*">
      <button onclick="createPost()">Post</button>
    </div>

    <div id="postsContainer">
      <div class="post">
      
  <div class="username">khushi</div>
  <div class="caption">Loving this new outfit! 😍</div>
  <img src="https://via.placeholder.com/500">

  <div class="actions">
    <span onclick="likePost(this)">❤️ 0</span>
    <span onclick="toggleComments(this)">💬 Comment</span>
  </div>

  <div class="comments"></div>

  <div class="comment-box" style="display:none;">
    <input type="text" placeholder="Add comment">
    <button onclick="addComment(this)">Post</button>
  </div>
</div>
      <div class="post">
  <div class="username">ABCD</div>
  <div class="caption">Loving this new outfit! 😍</div>
  <img src="https://via.placeholder.com/500">

  <div class="actions">
    <span onclick="likePost(this)">❤️ 0</span>
    <span onclick="toggleComments(this)">💬 Comment</span>
  </div>

  <div class="comments"></div>

  <div class="comment-box" style="display:none;">
    <input type="text" placeholder="Add comment">
    <button onclick="addComment(this)">Post</button>
  </div>
</div>
  </div>

  <!-- Success Popup -->
  <div class="modal" id="successModal">
    <div class="modal-content">
      <h2>✅ Post Uploaded!</h2>
      <p>Your post is successfully uploaded.</p>
      <button class="continue-btn" onclick="goToNextPage()">Continue</button>
    </div>
  </div>

  <script>
  function createPost() {
  const caption = document.getElementById("captionInput").value.trim();
  const file = document.getElementById("imageInput").files[0];

  // 🔥 Get product data (if user came from product page)
  const product = JSON.parse(localStorage.getItem("selectedProduct"));

  if (!caption && !file && !product) {
    alert("Please add a caption or image!");
    return;
  }

  // ✅ CASE 1: User uploaded image
  if (file) {
    const reader = new FileReader();

    reader.onload = function (e) {
      savePost(caption, e.target.result);
    };

    reader.readAsDataURL(file);
  }

  // ✅ CASE 2: No upload, but product image exists
  else if (product) {
    savePost(
      caption || `Reviewing: ${product.name} ✨`,
      product.image
    );

    // 🧹 remove after use (important)
    localStorage.removeItem("selectedProduct");
  }

  // ✅ CASE 3: Only text
  else {
    savePost(caption, null);
  }

  // reset inputs
  document.getElementById("captionInput").value = "";
  document.getElementById("imageInput").value = "";
}
    function goToNextPage() {
      window.location.href = "nextpage.html"; // change this to your actual page
    }
    function likePost(el) {
  let parts = el.innerText.split(' ');
  let count = parseInt(parts[1]);

  if (el.classList.contains('liked')) {
    count--;
    el.classList.remove('liked');
  } else {
    count++;
    el.classList.add('liked');
  }

  el.innerText = `❤️ ${count}`;
}

function toggleComments(el) {
  const post = el.closest('.post');
  const box = post.querySelector('.comment-box');

  box.style.display = box.style.display === 'none' ? 'flex' : 'none';
}

function addComment(btn) {
  const input = btn.previousElementSibling;
  const text = input.value.trim();

  if (!text) return;

  const comment = document.createElement('div');
  comment.className = 'comment';
  comment.innerText = '@you: ' + text;

  btn.parentElement.previousElementSibling.appendChild(comment);

  input.value = '';
}
function savePost(caption, image) {
  let posts = JSON.parse(localStorage.getItem("posts")) || [];

  posts.unshift({
    username: "@you",
    caption: caption,
    image: image,
    likes: 0,
    comments: []
  });

  localStorage.setItem("posts", JSON.stringify(posts));

  loadPosts();
}
window.onload = function () {
  loadPosts();

  const product = JSON.parse(localStorage.getItem("selectedProduct"));

  if (product) {
    document.getElementById("captionInput").value =
      `Reviewing: ${product.name} ✨`;

    // show image
    const preview = document.getElementById("preview");
    preview.src = product.image;
    preview.style.display = "block";

    // store it temporarily
    preview.setAttribute("data-product", product.image);
  }
};
function loadPosts() {
  const container = document.getElementById("postsContainer");
  container.innerHTML = "";

  let posts = JSON.parse(localStorage.getItem("posts")) || [];

  posts.forEach((postData, index) => {
    const post = document.createElement("div");
    post.className = "post";

    let imageHTML = postData.image ? `<img src="${postData.image}">` : "";

    let commentsHTML = postData.comments
      .map(c => `<div class="comment">${c}</div>`)
      .join("");

    post.innerHTML = `
      <div class="username">${postData.username}</div>
      <div class="caption">${postData.caption}</div>
      ${imageHTML}

      <div class="actions">
        <span onclick="likePostStorage(${index}, this)">❤️ ${postData.likes}</span>
        <span onclick="toggleComments(this)">💬 Comment</span>
      </div>

      <div class="comments">${commentsHTML}</div>

      <div class="comment-box" style="display:none;">
        <input type="text" placeholder="Add comment">
        <button onclick="addCommentStorage(${index}, this)">Post</button>
      </div>
    `;

    container.appendChild(post);
  });
}
function likePostStorage(index, el) {
  let posts = JSON.parse(localStorage.getItem("posts"));

  posts[index].likes++;

  localStorage.setItem("posts", JSON.stringify(posts));

  loadPosts();
}
function addCommentStorage(index, btn) {
  const input = btn.previousElementSibling;
  const text = input.value.trim();

  if (!text) return;

  let posts = JSON.parse(localStorage.getItem("posts"));

  posts[index].comments.push("@you: " + text);

  localStorage.setItem("posts", JSON.stringify(posts));

  loadPosts();
}
  </script>

</body>
</html>
