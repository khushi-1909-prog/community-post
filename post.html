<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Page</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

.container {
  width: 90%;
  max-width: 500px;
  margin: 20px auto;
}

h2 {
  text-align: center;
}

/* SMALLER POST CARDS */
.post {
  background: #fff;
  padding: 12px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  margin-bottom: 15px;
  font-size: 14px;
}

/* ✅ FIXED IMAGE (NO CROPPING) */
.post img, #preview {
  width: 100%;
  height: auto;
  max-height: 300px;
  object-fit: contain;
  border-radius: 10px;
  margin-top: 8px;
  background: #f5f5f5;
}

/* ACTIONS */
.actions {
  display: flex;
  gap: 12px;
  margin-top: 8px;
  font-size: 13px;
}

.actions span {
  cursor: pointer;
}

/* COMMENTS */
.comment-box {
  display: none;
  margin-top: 8px;
}

.comment-box input {
  width: 70%;
  padding: 4px;
}

/* POPUP */
.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#fff;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:350px;
}

textarea {
  width:100%;
  height:80px;
  border-radius:8px;
  padding:8px;
  border:1px solid #ccc;
}

.modal button {
  margin-top:10px;
  padding:6px 14px;
  border:none;
  border-radius:20px;
  background:#007bff;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<h2>Community Posts</h2>
<div id="postsContainer"></div>
</div>

<!-- POPUP -->
<div class="modal" id="postModal">
  <div class="modal-content">
    <h3>Create Post</h3>

    <textarea id="captionInput"></textarea>

    <!-- PRODUCT IMAGE -->
    <img id="preview" style="display:none;">

    <button onclick="createPost()">Post</button>
  </div>
</div>

<script>

/* DEFAULT POSTS */
const defaultPosts = [
  {
    username: "khushi",
    caption: "Loving the bag 😍",
    image: "new images/product3.jpg",
    likes: 2,
    comments: []
  },
  {
    username: "fashiongirl",
    caption: " Spacious And easy to carry",
    image: "new images/product7.jpg",
    likes: 5,
    comments: []
  },
  {
    username: "stylequeen",
    caption: "This bag is totally worth it 💼✨",
    image: "new images/product2.jpg",
    likes: 3,
    comments: []
  },
  {
    username: "trendsetter",
    caption: "Minimal & classy 🔥",
    image: "new images/product4.png",
    likes: 4,
    comments: []
  }
];

/* LOAD POSTS */
function loadPosts() {
  const container = document.getElementById("postsContainer");
  container.innerHTML = "";

  let userPosts = JSON.parse(localStorage.getItem("posts")) || [];

  let allPosts = [...userPosts, ...defaultPosts];

  allPosts.forEach((postData, index) => {

    const post = document.createElement("div");
    post.className = "post";

    let commentsHTML = postData.comments.map(c => `<div>${c}</div>`).join("");

    post.innerHTML = `
      <b>${postData.username}</b>
      <div>${postData.caption}</div>
      ${postData.image ? `<img src="${postData.image}">` : ""}

      <div class="actions">
        <span onclick="likePost(${index})">❤️ ${postData.likes}</span>
        <span onclick="toggleComments(this)">💬</span>
        ${index < userPosts.length ? `<span onclick="deletePost(${index})">🗑️</span>` : ""}
      </div>

      <div class="comments">${commentsHTML}</div>

      <div class="comment-box">
        <input type="text">
        <button onclick="addComment(${index}, this)">Post</button>
      </div>
    `;

    container.appendChild(post);
  });
}

/* CREATE POST */
function createPost() {
  const caption = document.getElementById("captionInput").value.trim();
  const preview = document.getElementById("preview");

  if (!caption && preview.style.display !== "block") {
    alert("Please write something!");
    return;
  }

  savePost(caption, preview.style.display === "block" ? preview.src : null);

  // reset
  document.getElementById("captionInput").value = "";
  preview.style.display = "none";
  preview.src = "";

  document.getElementById("postModal").style.display = "none";

  alert("✅ Your review has been posted!");
}

/* SAVE */
function savePost(caption, image) {
  let posts = JSON.parse(localStorage.getItem("posts")) || [];

  posts.unshift({
    username: "@you",
    caption,
    image,
    likes: 0,
    comments: []
  });

  localStorage.setItem("posts", JSON.stringify(posts));
  loadPosts();
}

/* LIKE */
function likePost(index) {
  let userPosts = JSON.parse(localStorage.getItem("posts")) || [];

  if (index < userPosts.length) {
    userPosts[index].likes++;
    localStorage.setItem("posts", JSON.stringify(userPosts));
  } else {
    defaultPosts[index - userPosts.length].likes++;
  }

  loadPosts();
}

/* DELETE */
function deletePost(index) {
  let userPosts = JSON.parse(localStorage.getItem("posts")) || [];

  userPosts.splice(index, 1);

  localStorage.setItem("posts", JSON.stringify(userPosts));
  loadPosts();
}

/* COMMENTS */
function toggleComments(el) {
  const box = el.closest('.post').querySelector('.comment-box');
  box.style.display = box.style.display === "none" ? "block" : "none";
}

function addComment(index, btn) {
  const input = btn.previousElementSibling;
  const text = input.value.trim();
  if (!text) return;

  let userPosts = JSON.parse(localStorage.getItem("posts")) || [];

  if (index < userPosts.length) {
    userPosts[index].comments.push("@you: " + text);
    localStorage.setItem("posts", JSON.stringify(userPosts));
  } else {
    defaultPosts[index - userPosts.length].comments.push("@you: " + text);
  }

  loadPosts();
}

/* ON LOAD */
window.onload = function () {
  loadPosts();

  alert(
    "Welcome to the Community Page!\n\n" +
    "Share your product reviews.\n\n" +
    "⚠️ PLEASE SCROLL TO THE END."
  );

  const product = JSON.parse(localStorage.getItem("selectedProduct"));

  if (product) {
    const textarea = document.getElementById("captionInput");

    // ✅ PLACEHOLDER FIX
    textarea.placeholder = `Write your reviews about ${product.name}`;

    const preview = document.getElementById("preview");
    preview.src = product.image;
    preview.style.display = "block";

    // ✅ AUTO OPEN POPUP
    document.getElementById("postModal").style.display = "flex";
  }
};

/* SCROLL END */
window.onscroll = function () {
  if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 5) {
    if (!window.reachedEnd) {
      window.reachedEnd = true;

      alert("You reached the end. Continue to feedback form.");

      window.location.href = "https://forms.gle/YOUR_FORM_LINK";
    }
  }
};

</script>

</body>
</html>
