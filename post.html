<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Page</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

.container {
  width: 85%;
  max-width: 520px;
  margin: 20px auto;
}

h2 {
  text-align: center;
}

/* SMALL BUTTON */
.open-post {
  display: block;
  margin: 10px auto;
  padding: 8px 16px;
  border-radius: 20px;
  border: none;
  background: #007bff;
  color: #fff;
  cursor: pointer;
}

/* POSTS */
.post {
  background: #fff;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 12px;
}

.post img {
  width: 100%;
  max-height: 250px;
  object-fit: cover;
  border-radius: 8px;
  margin-top: 6px;
}

.actions {
  display: flex;
  gap: 10px;
  font-size: 12px;
  margin-top: 6px;
}

.actions span {
  cursor: pointer;
}

/* COMMENTS */
.comment-box {
  display: none;
  margin-top: 8px;
}

.comment-box input {
  width: 65%;
}

/* MODAL */
.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#fff;
  width:90%;
  max-width:400px;
  padding:15px;
  border-radius:12px;
  animation: popup 0.3s ease;
}

@keyframes popup {
  from { transform: scale(0.8); opacity:0; }
  to { transform: scale(1); opacity:1; }
}

.modal-header {
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

textarea {
  width:100%;
  border:none;
  outline:none;
  font-size:15px;
  margin-top:10px;
}

.post-btn {
  margin-top:10px;
  padding:8px 15px;
  background:#007bff;
  color:#fff;
  border:none;
  border-radius:20px;
  cursor:pointer;
  display:block;
  margin-left:auto;
}
</style>
</head>

<body>

<div class="container">

<h2>Community Posts</h2>

<button class="open-post" onclick="openModal()">+ Share Review</button>

<div id="postsContainer"></div>

</div>

<!-- POPUP -->
<div class="modal" id="postModal">
  <div class="modal-content">

    <div class="modal-header">
      <span>Create Post</span>
      <span onclick="closeModal()" style="cursor:pointer;">✖</span>
    </div>

    <textarea id="captionInput">
What are your reviews about this product?
    </textarea>

    <img id="productPreview" style="display:none; width:100%; border-radius:10px; margin-top:10px;">

    <button class="post-btn" onclick="createPost()">Post</button>

  </div>
</div>

<script>

/* DEFAULT POSTS */
const defaultPosts = [
  {
    username: "khushi",
    caption: "Loving this new outfit 😍",
    image: "https://via.placeholder.com/500",
    likes: 2,
    comments: []
  },
  {
    username: "fashiongirl",
    caption: "Summer vibes ☀️",
    image: "https://via.placeholder.com/500",
    likes: 5,
    comments: []
  },
  {
    username: "stylequeen",
    caption: "This bag is totally worth it 💼✨",
    image: "https://via.placeholder.com/500",
    likes: 3,
    comments: []
  },
  {
    username: "trendsetter",
    caption: "Minimal & classy look 🔥",
    image: "https://via.placeholder.com/500",
    likes: 4,
    comments: []
  }
];

/* LOAD POSTS */
function loadPosts() {
  const container = document.getElementById("postsContainer");
  container.innerHTML = "";

  let userPosts = JSON.parse(localStorage.getItem("posts")) || [];
  let allPosts = [...userPosts, ...defaultPosts];

  allPosts.forEach((postData, index) => {

    const post = document.createElement("div");
    post.className = "post";

    let commentsHTML = postData.comments.map(c => `<div>${c}</div>`).join("");

    post.innerHTML = `
      <b>${postData.username}</b>
      <div>${postData.caption}</div>
      ${postData.image ? `<img src="${postData.image}">` : ""}

      <div class="actions">
        <span onclick="likePost(${index})">❤️ ${postData.likes}</span>
        <span onclick="toggleComments(this)">💬 Comment</span>
        ${index < userPosts.length ? `<span onclick="deletePost(${index})">🗑️ Delete</span>` : ""}
      </div>

      <div>${commentsHTML}</div>

      <div class="comment-box">
        <input type="text" placeholder="Add comment">
        <button onclick="addComment(${index}, this)">Post</button>
      </div>
    `;

    container.appendChild(post);
  });
}

/* MODAL */
function openModal() {
  document.getElementById("postModal").style.display = "flex";
}

function closeModal() {
  document.getElementById("postModal").style.display = "none";
}

/* CREATE POST */
function createPost() {
  const caption = document.getElementById("captionInput").value.trim();
  const product = JSON.parse(localStorage.getItem("selectedProduct"));
  const preview = document.getElementById("productPreview");

  if (!caption) {
    alert("Please write something!");
    return;
  }

  if (product) {
    savePost(caption, product.image);
    localStorage.removeItem("selectedProduct");
  } else {
    savePost(caption, null);
  }

  document.getElementById("captionInput").value =
    "What are your reviews about this product?";
  preview.style.display = "none";

  closeModal();

  alert("✅ Your review has been posted!");
}

/* SAVE */
function savePost(caption, image) {
  let posts = JSON.parse(localStorage.getItem("posts")) || [];

  posts.unshift({
    username: "@you",
    caption: caption,
    image: image,
    likes: 0,
    comments: []
  });

  localStorage.setItem("posts", JSON.stringify(posts));
  loadPosts();
}

/* LIKE */
function likePost(index) {
  let userPosts = JSON.parse(localStorage.getItem("posts")) || [];

  if (index < userPosts.length) {
    userPosts[index].likes++;
    localStorage.setItem("posts", JSON.stringify(userPosts));
  } else {
    defaultPosts[index - userPosts.length].likes++;
  }

  loadPosts();
}

/* DELETE */
function deletePost(index) {
  let userPosts = JSON.parse(localStorage.getItem("posts")) || [];

  userPosts.splice(index, 1);
  localStorage.setItem("posts", JSON.stringify(userPosts));
  loadPosts();
}

/* COMMENTS */
function toggleComments(el) {
  const box = el.closest('.post').querySelector('.comment-box');
  box.style.display = box.style.display === "none" ? "block" : "none";
}

function addComment(index, btn) {
  const input = btn.previousElementSibling;
  const text = input.value.trim();
  if (!text) return;

  let userPosts = JSON.parse(localStorage.getItem("posts")) || [];

  if (index < userPosts.length) {
    userPosts[index].comments.push("@you: " + text);
    localStorage.setItem("posts", JSON.stringify(userPosts));
  } else {
    defaultPosts[index - userPosts.length].comments.push("@you: " + text);
  }

  loadPosts();
}

/* PAGE LOAD */
window.onload = function () {
  loadPosts();

  alert(
    "Welcome to Community Page\n\n" +
    "Share your product reviews.\n\n" +
    "⚠️ PLEASE SCROLL TO THE END."
  );

  const product = JSON.parse(localStorage.getItem("selectedProduct"));

  if (product) {
    openModal();

    document.getElementById("captionInput").value =
      `What are your reviews about ${product.name}?`;

    const preview = document.getElementById("productPreview");
    preview.src = product.image;
    preview.style.display = "block";
  }
};

/* SCROLL END */
window.onscroll = function () {
  if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 5) {
    if (!window.reachedEnd) {
      window.reachedEnd = true;

      alert("Click OK to continue to the feedback form.");

      window.location.href = "https://forms.gle/YOUR_FORM_LINK";
    }
  }
};

</script>

</body>
</html>
