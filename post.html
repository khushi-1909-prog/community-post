<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyntho Community</title>
<style>
:root{ --bg:#121212; --card:#1e1e1e; --text:#fff; }
body.light{ --bg:#f5f5f5; --card:#fff; --text:#000; }
body{ margin:0; font-family:Arial; background:var(--bg); color:var(--text); }

.header{ background:var(--card); padding:15px; text-align:center; font-size:24px; font-weight:bold; border-bottom:1px solid #333; position:sticky; top:0; }
.header span{ font-family:cursive; background:linear-gradient(45deg,#ff416c,#ff4b2b); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.toggle{ position:absolute; right:15px; top:15px; cursor:pointer; }
.post, 
.post * {
  color: var(--text) !important;
}
.container{ width:90%; max-width:500px; margin:20px auto; }
.post-box,.post{ background:var(--card); padding:15px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.2); margin-bottom:20px; }

textarea{ width:100%; height:80px; border:1px solid #555; border-radius:8px; padding:10px; resize:none; margin-bottom:10px; background:transparent; color:var(--text); }

.small-btn{ width:auto; padding:6px 15px; font-size:14px; }

.username{ font-weight:bold; margin-bottom:5px; }
.post img{ width:100%; border-radius:10px; margin-top:10px; }
.actions{ display:flex; gap:15px; margin-top:10px; }
.actions span{ cursor:pointer; }

/* Comments */
.comments{ margin-top:10px; }
.comment{ font-size:14px; margin-top:5px; }
.comment-box{ display:flex; gap:5px; margin-top:10px; }
.comment-box input{ flex:1; padding:5px; }

.preview{ width:100%; margin-top:10px; border-radius:10px; }

.modal{ position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; }
.modal-content{ background:white; padding:20px; border-radius:12px; text-align:center; }
.caption {
  color: var(--text);
  margin-top: 5px;
}
</style>
</head>
<body>

<div class="header">
  <span>Zyntho</span>
  <span class="toggle" onclick="toggleMode()">🌞</span>
</div>

<div class="container">

<div class="post-box">
  <textarea id="captionInput" placeholder="Write something..."></textarea>
  <input type="file" id="imageInput" accept="image/*" onchange="previewImage()">
  <img id="preview" class="preview" style="display:none;">
  <button class="small-btn" onclick="createPost()">Post</button>
</div>

<div id="postsContainer">

<!-- Pre-added posts with comments enabled -->
<div class="post">
  <div class="username">khushi</div>
  <div>Obsessed with this look 😍</div>
  <img src="https://via.placeholder.com/500">
  <div class="actions">
    <span onclick="likePost(this)">❤️ 2</span>
    <span onclick="toggleComments(this)">💬 Comment</span>
  </div>
  <div class="comments"></div>
  <div class="comment-box" style="display:none">
    <input type="text" placeholder="Add comment">
    <button onclick="addComment(this)">Post</button>
  </div>
</div>

<div class="post">
  <div class="username">fashiongirl</div>
  <div>Summer vibes ☀️</div>
  <img src="https://via.placeholder.com/500">
  <div class="actions">
    <span onclick="likePost(this)">❤️ 5</span>
    <span onclick="toggleComments(this)">💬 Comment</span>
  </div>
  <div class="comments"></div>
  <div class="comment-box" style="display:none">
    <input type="text" placeholder="Add comment">
    <button onclick="addComment(this)">Post</button>
  </div>
</div>

</div>
</div>

<div class="modal" id="successModal">
  <div class="modal-content">
    <h2>✅ Uploaded!</h2>
    <button onclick="goToNextPage()">Continue</button>
  </div>
</div>

<script>
function previewImage(){
  const file=document.getElementById('imageInput').files[0];
  const preview=document.getElementById('preview');
  if(file){ preview.src=URL.createObjectURL(file); preview.style.display='block'; }
}

function createPost(){
  const caption=document.getElementById('captionInput').value;
  const file=document.getElementById('imageInput').files[0];

  if(!caption && !file){ alert('Add something'); return; }

  const post=document.createElement('div');
  post.className='post';

  let imgHTML='';
  if(file){ imgHTML=`<img src="${URL.createObjectURL(file)}">`; }

  post.innerHTML=`
    <div class="username">@you</div>
    <div class="caption">${caption}</div>
    ${imgHTML}
    <div class="actions">
      <span onclick="likePost(this)">❤️ 0</span>
      <span onclick="toggleComments(this)">💬 Comment</span>
    </div>
    <div class="comments"></div>
    <div class="comment-box" style="display:none">
      <input type="text" placeholder="Add comment">
      <button onclick="addComment(this)">Post</button>
    </div>
  `;

  document.getElementById('postsContainer').prepend(post);

  document.getElementById('captionInput').value='';
  document.getElementById('imageInput').value='';
  document.getElementById('preview').style.display='none';

  document.getElementById('successModal').style.display='flex';
}

function likePost(el){
  let parts = el.innerText.split(' ');
  let count = parseInt(parts[1]);

  if(el.classList.contains('liked')){
    count--;
    el.classList.remove('liked');
  } else {
    count++;
    el.classList.add('liked');
  }

  el.innerText = `❤️ ${count}`;
}

  function toggleComments(el){
  const post=el.closest('.post');
  const box=post.querySelector('.comment-box');
  box.style.display = box.style.display==='none' ? 'flex' : 'none';
}

function addComment(btn){
  const input=btn.previousElementSibling;
  const text=input.value;
  if(!text) return;

  const comment=document.createElement('div');
  comment.className='comment';
  comment.innerText='@you: '+text;

  btn.parentElement.previousElementSibling.appendChild(comment);
  input.value='';
}

function toggleMode(){ document.body.classList.toggle('light'); }

function goToNextPage(){ window.location.href='nextpage.html'; }
</script>

</body>
</html>
