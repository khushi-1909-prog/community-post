<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Page</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

.container {
  width: 90%;
  max-width: 500px;
  margin: 20px auto;
}

h2 {
  text-align: center;
}

/* POSTS */
.post {
  background: #fff;
  padding: 12px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  margin-bottom: 15px;
  font-size: 14px;
}

.post img {
  width: 100%;
  max-height: 300px;
  object-fit: contain;
  border-radius: 10px;
  margin-top: 8px;
  background: #f5f5f5;
}

.actions {
  display: flex;
  gap: 12px;
  margin-top: 8px;
}

.actions span {
  cursor: pointer;
}

/* MODAL (COMMON FOR ALL POPUPS) */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.modal-box {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  width: 85%;
  max-width: 350px;
  text-align: center;
}

/* INPUTS */
textarea {
  width: 100%;
  height: 80px;
  border-radius: 8px;
  padding: 8px;
  border: 1px solid #ccc;
}

button {
  margin-top: 10px;
  padding: 6px 14px;
  border: none;
  border-radius: 20px;
  background: #007bff;
  color: #fff;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <h2>Community Posts</h2>
  <div id="postsContainer"></div>
</div>

<!-- ✅ CREATE POST MODAL -->
<div class="modal" id="postModal">
  <div class="modal-box">
    <h3>Create Post</h3>
    <textarea id="captionInput"></textarea>
    <img id="preview" style="display:none;">
    <button onclick="createPost()">Post</button>
  </div>
</div>

<!-- ✅ WELCOME POPUP -->
<div class="modal" id="welcomePopup">
  <div class="modal-box">
    <h3>Welcome to the Community Page!</h3>
    <p>
      Share your experience about the product you purchased.
      You can edit the default text and image provided.
    </p>
    <p><b>⚠️ Please scroll to the end.</b></p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script>

/* DEFAULT POSTS */
const defaultPosts = [
  {username:"khushi",caption:"Loving the bag 😍",image:"new images/product3.jpg",likes:2,comments:[]},
  {username:"fashiongirl",caption:"Spacious And easy to carry",image:"new images/product7.jpg",likes:5,comments:[]},
  {username:"stylequeen",caption:"Worth it 💼✨",image:"new images/product2.jpg",likes:3,comments:[]},
  {username:"trendsetter",caption:"Minimal & classy 🔥",image:"new images/product4.png",likes:4,comments:[]}
];

/* LOAD POSTS */
function loadPosts() {
  const container = document.getElementById("postsContainer");
  container.innerHTML = "";

  let userPosts = JSON.parse(localStorage.getItem("posts")) || [];
  let allPosts = [...userPosts, ...defaultPosts];

  allPosts.forEach((postData, index) => {
    const post = document.createElement("div");
    post.className = "post";

    post.innerHTML = `
      <b>${postData.username}</b>
      <div>${postData.caption}</div>
      ${postData.image ? `<img src="${postData.image}">` : ""}

      <div class="actions">
        <span onclick="likePost(${index})">❤️ ${postData.likes}</span>
        ${index < userPosts.length ? `<span onclick="deletePost(${index})">🗑️</span>` : ""}
      </div>
    `;

    container.appendChild(post);
  });
}

/* CREATE POST */
function createPost() {
  const caption = document.getElementById("captionInput").value.trim();
  const preview = document.getElementById("preview");

  if (!caption && preview.style.display !== "block") {
    return;
  }

  let posts = JSON.parse(localStorage.getItem("posts")) || [];

  posts.unshift({
    username: "@you",
    caption,
    image: preview.style.display === "block" ? preview.src : null,
    likes: 0,
    comments: []
  });

  localStorage.setItem("posts", JSON.stringify(posts));
  document.getElementById("postModal").style.display = "none";

  loadPosts();
}

/* LIKE */
function likePost(index) {
  let userPosts = JSON.parse(localStorage.getItem("posts")) || [];

  if (index < userPosts.length) {
    userPosts[index].likes++;
    localStorage.setItem("posts", JSON.stringify(userPosts));
  } else {
    defaultPosts[index - userPosts.length].likes++;
  }

  loadPosts();
}

/* DELETE */
function deletePost(index) {
  let userPosts = JSON.parse(localStorage.getItem("posts")) || [];
  userPosts.splice(index, 1);
  localStorage.setItem("posts", JSON.stringify(userPosts));
  loadPosts();
}

/* CLOSE POPUP */
function closePopup() {
  document.getElementById("welcomePopup").style.display = "none";
}

/* PAGE LOAD */
window.onload = function () {
  loadPosts();

  // ✅ SHOW WELCOME POPUP ON LOAD
  setTimeout(() => {
    document.getElementById("welcomePopup").style.display = "flex";
  }, 300);
   const product = JSON.parse(localStorage.getItem("selectedProduct"));

  if (product) {
    const textarea = document.getElementById("captionInput");
    textarea.placeholder = `Write your reviews about ${product.name}`;

    const preview = document.getElementById("preview");
    preview.src = product.image;
    preview.style.display = "block";

    // open post modal AFTER welcome closes (optional better UX)
    document.getElementById("postModal").style.display = "flex";
  }
};

/* SCROLL END POPUP */
window.onscroll = function () {
  if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 5) {
    if (!window.reachedEnd) {
      window.reachedEnd = true;

      document.getElementById("welcomePopup").innerHTML = `
        <div class="modal-box">
          <p><b>You reached the end 🎉</b></p>
          <button onclick="window.location.href='https://forms.gle/YOUR_FORM_LINK'">Continue</button>
        </div>
      `;

      document.getElementById("welcomePopup").style.display = "flex";
    }
  }
};

</script>

</body>
</html>
