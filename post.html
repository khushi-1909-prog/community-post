<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Page</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

.container {
  width: 90%;
  max-width: 550px;
  margin: 15px auto;
}

h2 {
  text-align: center;
}

/* POSTS (smaller cards) */
.post {
  background: #fff;
  padding: 12px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.08);
  margin-bottom: 15px;
  font-size: 14px;
}

/* IMAGE FIX (no crop) */
.post img {
  width: 100%;
  height: auto;
  border-radius: 8px;
  margin-top: 8px;
}

/* ACTIONS */
.actions {
  display: flex;
  gap: 12px;
  margin-top: 8px;
  font-size: 13px;
}

.actions span {
  cursor: pointer;
}

/* COMMENTS */
.comment-box {
  display: none;
  margin-top: 8px;
}

.comment-box input {
  width: 70%;
  padding: 5px;
}

/* FLOATING BUTTON */
.fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #007bff;
  color: white;
  font-size: 22px;
  border: none;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  cursor: pointer;
}

/* POPUP */
.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#fff;
  padding:15px;
  border-radius:12px;
  width:90%;
  max-width:400px;
}

/* TEXTAREA */
textarea {
  width:100%;
  height:70px;
  border-radius:8px;
  padding:8px;
  border:1px solid #ccc;
}

/* BUTTON */
.modal-content button {
  padding:8px 18px;
  background:#007bff;
  color:#fff;
  border:none;
  border-radius:20px;
  margin-top:10px;
  cursor:pointer;
}

/* PREVIEW IMAGE */
#preview {
  display:none;
  width:100%;
  border-radius:8px;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="container">
<h2>Community Posts</h2>
<div id="postsContainer"></div>
</div>

<!-- FLOAT BUTTON -->
<button class="fab" onclick="openPopup()">＋</button>

<!-- POST POPUP -->
<div class="modal" id="postModal">
  <div class="modal-content">
    <textarea id="captionInput" placeholder="Write your reviews here"></textarea>

    <!-- PRODUCT IMAGE AUTO SHOW -->
    <img id="preview">

    <button onclick="createPost()">Post</button>
  </div>
</div>

<script>

/* DEFAULT POSTS */
const defaultPosts = [
  {username:"khushi",caption:"Loving this outfit 😍",image:"https://via.placeholder.com/500",likes:2,comments:[]},
  {username:"fashiongirl",caption:"Summer vibes ☀️",image:"https://via.placeholder.com/500",likes:4,comments:[]},
  {username:"stylequeen",caption:"Amazing quality 💼✨",image:"https://via.placeholder.com/500",likes:3,comments:[]},
  {username:"trendsetter",caption:"Minimal & classy 🔥",image:"https://via.placeholder.com/500",likes:5,comments:[]}
];

/* LOAD POSTS */
function loadPosts() {
  const container = document.getElementById("postsContainer");
  container.innerHTML = "";

  let userPosts = JSON.parse(localStorage.getItem("posts")) || [];

  let allPosts = [...userPosts, ...defaultPosts];

  allPosts.forEach((postData, index) => {

    const post = document.createElement("div");
    post.className = "post";

    let commentsHTML = postData.comments.map(c=>`<div>${c}</div>`).join("");

    post.innerHTML = `
      <b>${postData.username}</b>
      <div>${postData.caption}</div>
      ${postData.image ? `<img src="${postData.image}">` : ""}

      <div class="actions">
        <span onclick="likePost(${index})">❤️ ${postData.likes}</span>
        <span onclick="toggleComments(this)">💬 Comment</span>
        ${index < userPosts.length ? `<span onclick="deletePost(${index})">🗑️</span>` : ""}
      </div>

      <div class="comments">${commentsHTML}</div>

      <div class="comment-box">
        <input type="text">
        <button onclick="addComment(${index}, this)">Post</button>
      </div>
    `;

    container.appendChild(post);
  });
}

/* POPUP CONTROL */
function openPopup() {
  document.getElementById("postModal").style.display = "flex";
}

/* CREATE POST */
function createPost() {
  const caption = document.getElementById("captionInput").value.trim();
  const preview = document.getElementById("preview");

  if (!caption && preview.style.display !== "block") {
    alert("Write something!");
    return;
  }

  savePost(caption, preview.style.display==="block"?preview.src:null);

  document.getElementById("captionInput").value="";
  preview.style.display="none";
  document.getElementById("postModal").style.display="none";

  alert("✅ Your review posted!");
}

/* SAVE */
function savePost(caption,image) {
  let posts = JSON.parse(localStorage.getItem("posts")) || [];

  posts.unshift({
    username:"@you",
    caption,
    image,
    likes:0,
    comments:[]
  });

  localStorage.setItem("posts",JSON.stringify(posts));
  loadPosts();
}

/* LIKE */
function likePost(index) {
  let userPosts = JSON.parse(localStorage.getItem("posts")) || [];

  if(index < userPosts.length){
    userPosts[index].likes++;
    localStorage.setItem("posts",JSON.stringify(userPosts));
  } else {
    defaultPosts[index-userPosts.length].likes++;
  }

  loadPosts();
}

/* DELETE */
function deletePost(index){
  let userPosts = JSON.parse(localStorage.getItem("posts")) || [];
  userPosts.splice(index,1);
  localStorage.setItem("posts",JSON.stringify(userPosts));
  loadPosts();
}

/* COMMENTS */
function toggleComments(el){
  const box = el.closest('.post').querySelector('.comment-box');
  box.style.display = box.style.display==="block"?"none":"block";
}

function addComment(index,btn){
  const text = btn.previousElementSibling.value.trim();
  if(!text) return;

  let userPosts = JSON.parse(localStorage.getItem("posts")) || [];

  if(index < userPosts.length){
    userPosts[index].comments.push("@you: "+text);
    localStorage.setItem("posts",JSON.stringify(userPosts));
  } else {
    defaultPosts[index-userPosts.length].comments.push("@you: "+text);
  }

  loadPosts();
}

/* LOAD + PRODUCT AUTO IMAGE */
window.onload = function(){
  loadPosts();

  alert("Welcome to Community Page\n\nShare your product reviews\n\n⚠️ Scroll till end");

  const product = JSON.parse(localStorage.getItem("selectedProduct"));

  if(product){
    document.getElementById("captionInput").value =
      `Reviewing: ${product.name} ✨`;

    const preview = document.getElementById("preview");
    preview.src = product.image;
    preview.style.display = "block";

    openPopup();
  }
};

/* SCROLL ALERT */
window.onscroll = function(){
  if((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 5){
    if(!window.endReached){
      window.endReached=true;
      alert("Click OK to continue to form");
      window.location.href="https://forms.gle/YOUR_FORM_LINK";
    }
  }
};

</script>

</body>
</html>
