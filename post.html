<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Page</title>

<style>
body { font-family: Arial; background: #f5f5f5; margin: 0; }
.container { width: 90%; max-width: 600px; margin: 20px auto; }

.post-box, .post {
  background: #fff;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  margin-bottom: 20px;
}

textarea {
  width: 100%; height: 80px;
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 10px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.post img {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

.actions {
  display: flex;
  gap: 15px;
  margin-top: 10px;
}

.actions span {
  cursor: pointer;
}

.comment-box {
  display: none;
  margin-top: 10px;
}

.comment-box input {
  flex: 1;
  padding: 5px;
}

/* Popup */
.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#fff;
  padding:20px;
  border-radius:12px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h2>Community Posts</h2>

<div class="post-box">
  <textarea id="captionInput" placeholder="Write something..."></textarea>
  <input type="file" id="imageInput">
  
  <!-- ✅ PREVIEW FIX -->
  <img id="preview" style="display:none; width:100%; border-radius:10px; margin-top:10px;">
  
  <button onclick="createPost()">Post</button>
</div>

<div id="postsContainer"></div>

</div>

<!-- ✅ POPUP -->
<div class="modal" id="successModal">
  <div class="modal-content">
    <h3>✅ Your review is posted!</h3>
    <button onclick="goToForm()">OK</button>
  </div>
</div>

<script>

// LOAD POSTS
function loadPosts() {
  const container = document.getElementById("postsContainer");
  container.innerHTML = "";

  let posts = JSON.parse(localStorage.getItem("posts"));

  // ✅ DEFAULT POSTS
  if (!posts || posts.length === 0) {
    posts = [
      {
        username: "khushi",
        caption: "Loving this new outfit 😍",
        image: "https://via.placeholder.com/500",
        likes: 2,
        comments: []
      },
      {
        username: "fashiongirl",
        caption: "Summer vibes ☀️",
        image: "https://via.placeholder.com/500",
        likes: 5,
        comments: []
      }
    ];
    localStorage.setItem("posts", JSON.stringify(posts));
  }

  posts.forEach((postData, index) => {

    const post = document.createElement("div");
    post.className = "post";

    let commentsHTML = postData.comments.map(c =>
      `<div>${c}</div>`
    ).join("");

    post.innerHTML = `
      <b>${postData.username}</b>
      <div>${postData.caption}</div>
      ${postData.image ? `<img src="${postData.image}">` : ""}

      <div class="actions">
        <span onclick="likePost(${index})">❤️ ${postData.likes}</span>
        <span onclick="toggleComments(this)">💬 Comment</span>
        <span onclick="deletePost(${index})">🗑️ Delete</span>
      </div>

      <div class="comments">${commentsHTML}</div>

      <div class="comment-box">
        <input type="text" placeholder="Add comment">
        <button onclick="addComment(${index}, this)">Post</button>
      </div>
    `;

    container.appendChild(post);
  });
}

// CREATE POST
function createPost() {
  const caption = document.getElementById("captionInput").value.trim();
  const file = document.getElementById("imageInput").files[0];
  const preview = document.getElementById("preview");

  if (!caption && !file && preview.style.display !== "block") {
    alert("Add something!");
    return;
  }

  if (file) {
    const reader = new FileReader();

    reader.onload = function(e) {
      savePost(caption, e.target.result);
    };

    reader.readAsDataURL(file);
  }
  else if (preview.style.display === "block") {
    savePost(caption, preview.src);
    localStorage.removeItem("selectedProduct");
  }
  else {
    savePost(caption, null);
  }

  document.getElementById("captionInput").value = "";
  document.getElementById("imageInput").value = "";
  preview.style.display = "none";

  // ✅ SHOW POPUP
  document.getElementById("successModal").style.display = "flex";
}

// SAVE POST
function savePost(caption, image) {
  let posts = JSON.parse(localStorage.getItem("posts")) || [];

  posts.unshift({
    username: "@you",
    caption: caption,
    image: image,
    likes: 0,
    comments: []
  });

  localStorage.setItem("posts", JSON.stringify(posts));
  loadPosts();
}

// LIKE
function likePost(index) {
  let posts = JSON.parse(localStorage.getItem("posts"));
  posts[index].likes++;
  localStorage.setItem("posts", JSON.stringify(posts));
  loadPosts();
}

// DELETE
function deletePost(index) {
  let posts = JSON.parse(localStorage.getItem("posts"));
  posts.splice(index, 1);
  localStorage.setItem("posts", JSON.stringify(posts));
  loadPosts();
}

// COMMENTS
function toggleComments(el) {
  const box = el.closest('.post').querySelector('.comment-box');
  box.style.display = box.style.display === "none" ? "block" : "none";
}

function addComment(index, btn) {
  const input = btn.previousElementSibling;
  const text = input.value.trim();
  if (!text) return;

  let posts = JSON.parse(localStorage.getItem("posts"));
  posts[index].comments.push("@you: " + text);

  localStorage.setItem("posts", JSON.stringify(posts));
  loadPosts();
}

// PRODUCT AUTO FILL
window.onload = function () {
  loadPosts();

  const product = JSON.parse(localStorage.getItem("selectedProduct"));

  if (product) {
    document.getElementById("captionInput").value =
      `Reviewing: ${product.name} ✨`;

    const preview = document.getElementById("preview");
    preview.src = product.image;
    preview.style.display = "block";
  }
};

// REDIRECT
function goToForm() {
  window.location.href = "https://forms.gle/YOUR_FORM_LINK";
}

</script>

</body>
</html>
